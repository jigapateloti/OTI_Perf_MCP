<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LRE Chat Command UI</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f6fb; }
    .app { max-width: 760px; margin: 40px auto; padding: 24px; background: #fff; border-radius: 12px; box-shadow: 0 12px 30px rgba(0,0,0,.08); }
    h1 { margin-top: 0; }
    textarea { width: 100%; min-height: 120px; font-size: 16px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; resize: vertical; }
    .prompt-list { margin: 20px 0; padding: 0; list-style: none; }
    .prompt-item { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; margin-bottom: 10px; }
    .prompt-text { padding: 12px 14px; background: #f7f8fc; border: 1px solid #e0e4ee; border-radius: 8px; font-family: Menlo, Monaco, Consolas, monospace; font-size: 14px; word-break: break-word; }
    .prompt-item button { margin: 0; padding: 10px 14px; font-size: 14px; border: none; border-radius: 8px; background: #2463ff; color: #fff; cursor: pointer; transition: background .18s ease, transform .18s ease; }
    .prompt-item button.copy { background: #0b72f0; }
    .prompt-item button.copy:hover { background: #0855c2; transform: translateY(-1px); }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
    .controls button { flex: 1 1 160px; min-width: 140px; padding: 12px 16px; font-size: 15px; border: none; border-radius: 10px; cursor: pointer; transition: background .18s ease, transform .18s ease; }
    .controls button#send { background: #2463ff; color: #fff; }
    .controls button#send:hover { background: #1b4fce; transform: translateY(-1px); }
    .controls button#reset { background: #ebebeb; color: #333; }
    .controls button#reset:hover { background: #d6d6d6; transform: translateY(-1px); }
    .display-box { background: #f7f8fc; padding: 20px; border-radius: 12px; border: 1px solid #e0e4ee; margin-top: 16px; line-height: 1.6; font-size: 15px; color: #333; }
    .display-box h3 { margin-top: 0; color: #1a202c; border-bottom: 2px solid #edf2f7; padding-bottom: 6px; }
    .display-box ul { margin: 10px 0 0 0; padding-left: 20px; }
    .display-box li { margin-bottom: 8px; }
    .help { margin-top: 16px; color: #555; }
  </style>
</head>
<body>
  <div class="app">
    <h1>LRE Chat Command UI</h1>
    <p>Click a prompt to copy it, then paste it into your chat window.</p>
    <ul class="prompt-list">
      <li class="prompt-item">
        <div class="prompt-text">get hosts</div>
        <button class="copy" data-prompt="get hosts">Copy</button>
      </li>
      <li class="prompt-item">
        <div class="prompt-text">get scripts</div>
        <button class="copy" data-prompt="get scripts">Copy</button>
      </li>
      <li class="prompt-item">
        <div class="prompt-text">get tests</div>
        <button class="copy" data-prompt="get tests">Copy</button>
      </li>
      <li class="prompt-item">
        <div class="prompt-text">get runs</div>
        <button class="copy" data-prompt="get runs">Copy</button>
      </li>
      <li class="prompt-item">
        <div class="prompt-text">get run 1234</div>
        <button class="copy" data-prompt="get run 1234">Copy</button>
      </li>
      <li class="prompt-item">
        <div class="prompt-text">start run testId 456 testInstanceId 789</div>
        <button class="copy" data-prompt="start run testId 456 testInstanceId 789">Copy</button>
      </li>
      <li class="prompt-item">
        <div class="prompt-text">poll run 1234</div>
        <button class="copy" data-prompt="poll run 1234">Copy</button>
      </li>
      <li class="prompt-item">
        <div class="prompt-text">get report 1234</div>
        <button class="copy" data-prompt="get report 1234">Copy</button>
      </li>
    </ul>

    <textarea id="prompt" placeholder="Type your command here..."></textarea>
    <div class="controls">
      <button id="send">Send</button>
      <button id="reset" class="reset">Reset</button>
    </div>
    <div class="help" id="status"></div>
    <div class="display-box" id="response"></div>
  </div>

  <script>
    const promptEl = document.getElementById('prompt');
    const responseEl = document.getElementById('response');
    const statusEl = document.getElementById('status');
    const sendBtn = document.getElementById('send');
    const resetBtn = document.getElementById('reset');
    const copyButtons = document.querySelectorAll('.prompt-item button.copy');

    function renderSummary(data) {
      if (!data.success) {
        return `<p style="color:#d93025; font-weight:bold;">⚠️ Error: ${data.message || data.error}</p>`;
      }

      let summaryHtml = `<p style="color:#1e8e3e; font-weight:bold;">🤖 Assistant Response:</p>`;
      summaryHtml += `<p>${data.message}</p>`;

      if (data.hosts) {
        summaryHtml += `<h3>🖥️ Load Generators Status</h3>`;
        if (Array.isArray(data.hosts) && data.hosts.length > 0) {
          summaryHtml += `<ul>`;
          data.hosts.forEach(h => {
            const stateColor = h.Status === 'Operational' ? '#1e8e3e' : '#d93025';
            summaryHtml += `<li><strong>${h.Name}</strong> - Status: <span style="color:${stateColor};font-weight:bold;">${h.Status || h.StatusState || 'Unknown'}</span></li>`;
          });
          summaryHtml += `</ul>`;
        } else {
          summaryHtml += `<p>No active load generators configured.</p>`;
        }
      }

      if (data.scripts) {
        summaryHtml += `<h3>📜 Scripts List</h3>`;
        if (Array.isArray(data.scripts) && data.scripts.length > 0) {
          summaryHtml += `<ul>`;
          data.scripts.forEach(s => {
            summaryHtml += `<li><strong>${s.Name}</strong> - Path: <code>${s.Path}</code> (ID: ${s.ID})</li>`;
          });
          summaryHtml += `</ul>`;
        } else {
          summaryHtml += `<p>No scripts found in the project.</p>`;
        }
      }

      if (data.tests) {
        summaryHtml += `<h3>🧪 Configured Tests</h3>`;
        if (Array.isArray(data.tests) && data.tests.length > 0) {
          summaryHtml += `<ul>`;
          data.tests.forEach(t => {
            summaryHtml += `<li><strong>${t.Name}</strong> (ID: ${t.ID}) - Created By: <em>${t.CreatedBy}</em></li>`;
          });
          summaryHtml += `</ul>`;
        } else {
          summaryHtml += `<p>No test definitions configured on the server.</p>`;
        }
      }

      if (data.runs) {
        summaryHtml += `<h3>🏃 Latest Runs</h3>`;
        if (Array.isArray(data.runs) && data.runs.length > 0) {
          summaryHtml += `<ul>`;
          data.runs.forEach(r => {
            const hasFinished = r.state === 'Finished' ? '#1e8e3e' : '#e28743';
            summaryHtml += `<li><strong>Run ID: ${r.id}</strong> (Test: ${r.testId}) - State: <span style="color:${hasFinished};font-weight:bold;">${r.state}</span></li>`;
          });
          summaryHtml += `</ul>`;
        } else {
          summaryHtml += `<p>No project execution history available.</p>`;
        }
      }

      if (data.run) {
        const r = data.run;
        const hasFinished = r.state === 'Finished' ? '#1e8e3e' : '#e28743';
        summaryHtml += `<h3>🏃 Run Details</h3>`;
        summaryHtml += `<ul>`;
        summaryHtml += `<li><strong>Run ID:</strong> ${r.id}</li>`;
        summaryHtml += `<li><strong>Test ID:</strong> ${r.testId} (Instance: ${r.instanceId})</li>`;
        summaryHtml += `<li><strong>Current State:</strong> <span style="color:${hasFinished};font-weight:bold;">${r.state}</span></li>`;
        summaryHtml += `<li><strong>Time Range:</strong> ${r.startTime || 'Pending'} to ${r.endTime || 'Active'}</li>`;
        summaryHtml += `</ul>`;
      }

      return summaryHtml;
    }

    copyButtons.forEach(button => {
      button.addEventListener('click', async () => {
        const prompt = button.dataset.prompt;
        try {
          await navigator.clipboard.writeText(prompt);
          statusEl.textContent = `Copied to clipboard! Ready to send.`;
          promptEl.value = prompt;
        } catch (err) {
          statusEl.textContent = 'Copy failed. Please copy manually.';
        }
      });
    });

    sendBtn.addEventListener('click', async () => {
      const prompt = promptEl.value.trim();
      if (!prompt) return;
      sendBtn.disabled = true;
      statusEl.textContent = 'Sending command...';
      responseEl.innerHTML = '';

      try {
        const res = await fetch('/command', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        
        // Render rich assistant-style summary
        statusEl.textContent = data.success ? 'Success' : 'Error';
        responseEl.innerHTML = renderSummary(data);
      } catch (err) {
        statusEl.textContent = 'Request failed';
        responseEl.innerHTML = `<span style="color:#d93025; font-weight:bold;">${err.message}</span>`;
      } finally {
        sendBtn.disabled = false;
      }
    });

    resetBtn.addEventListener('click', () => {
      promptEl.value = '';
      statusEl.textContent = '';
      responseEl.innerHTML = '';
      promptEl.focus();
    });
  </script>
</body>
</html>
